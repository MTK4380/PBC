<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tyre Details | PBC</title>
  <link rel="stylesheet" href="styles.css?v=20260531-header-sm1">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <main class="section"><div class="container" id="product-root"><p>Loading…</p></div></main>
  <script src="js/price-lists.js?v=20260531-quotation-basket1"></script>
  <script src="js/catalog.js?v=20260531-quotation-basket1"></script>
  <script src="js/store.js?v=20260531-quotation-basket1"></script>
  <script src="js/quote-actions.js?v=20260531-quotation-basket1"></script>
  <script>
    (function () {
      var id = new URLSearchParams(location.search).get("id");
      var p = window.PBC_Store && window.PBC_Store.getById(id);
      var root = document.getElementById("product-root");
      if (!p) { root.innerHTML = "<p>Product not found. <a href=\"shop.html\">Back to shop</a></p>"; return; }
      function escapeHtml(value) {
        return String(value || "").replace(/[&<>"']/g, function (char) {
          return {
            "&": "&amp;",
            "<": "&lt;",
            ">": "&gt;",
            "\"": "&quot;",
            "'": "&#39;"
          }[char];
        });
      }
      var title = p.catalogName || p.design;
      var imageAlt = p.imageAlt || title + " tyre";
      var imageUrl = p.image ? p.image + "?v=20260531-imgfix1" : "";
      var image = p.image
        ? '<div class="product-detail-media"><button type="button" class="tyre-image-zoom js-image-zoom" data-zoom-src="' + escapeHtml(imageUrl) + '" data-zoom-alt="' + escapeHtml(imageAlt) + '" aria-label="View larger image of ' + escapeHtml(imageAlt) + '"><img src="' + escapeHtml(imageUrl) + '" alt="' + escapeHtml(imageAlt) + '" loading="eager"></button></div>'
        : '<div class="shop-card-img shop-card-img--' + p.vehicle + '"></div>';
      var summary = p.summary ? "<p class=\"product-detail-summary\">" + escapeHtml(p.summary) + "</p>" : "";
      var features = p.features && p.features.length
        ? "<ul class=\"product-detail-features\">" + p.features.map(function (feature) {
          return "<li>" + escapeHtml(feature) + "</li>";
        }).join("") + "</ul>"
        : "";
      document.title = title + " " + p.size + " | PBC";
      root.innerHTML =
        "<nav class=\"category-switcher\"><a href=\"shop.html\">← Shop</a></nav>" +
        "<article class=\"product-detail\">" +
        image +
        "<h1>" + escapeHtml(title) + "</h1><p>" + escapeHtml(p.brand) + " · " + escapeHtml(p.catalogCategory || p.category) + "</p>" +
        "<p class=\"product-detail-spec\">" + escapeHtml(p.size) + " · Ply " + escapeHtml(p.ply) + "</p>" +
        summary +
        features +
        "<p class=\"shop-card-price\" style=\"font-size:1.5rem\">" + window.PBC_Quote.formatPrice(p.price) + "</p>" +
        "<input type=\"number\" id=\"pqty\" min=\"1\" value=\"1\" class=\"catalog-qty\"> " +
        "<button class=\"btn btn-primary\" id=\"pquote\">Add to Quote</button> " +
        "<a class=\"btn btn--on-light btn-secondary\" href=\"quote.html\">My Quotation</a></article>";
      document.getElementById("pquote").onclick = function () {
        window.PBC_Quote.addProduct(p, document.getElementById("pqty").value);
        document.getElementById("pquote").textContent = "Added to Quote";
        setTimeout(function () { document.getElementById("pquote").textContent = "Add to Quote"; }, 1200);
      };
    })();
  </script>
  <script src="js/image-zoom.js?v=20260531-quotation-basket1"></script>
  <script src="js/site.js?v=20260531-transparent-header1"></script>
</body>
</html>
