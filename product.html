<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tyre Details | PBC</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <main class="section"><div class="container" id="product-root"><p>Loading…</p></div></main>
  <script src="js/price-lists.js"></script>
  <script src="js/catalog.js"></script>
  <script src="js/store.js"></script>
  <script src="js/cart.js"></script>
  <script>
    (function () {
      var id = new URLSearchParams(location.search).get("id");
      var p = window.PBC_Store && window.PBC_Store.getById(id);
      var root = document.getElementById("product-root");
      if (!p) { root.innerHTML = "<p>Product not found. <a href=\"shop.html\">Back to shop</a></p>"; return; }
      document.title = p.size + " " + p.design + " | PBC";
      root.innerHTML =
        "<nav class=\"category-switcher\"><a href=\"shop.html\">← Shop</a></nav>" +
        "<article class=\"product-detail\">" +
        "<div class=\"shop-card-img shop-card-img--" + p.vehicle + "\"></div>" +
        "<h1>" + p.size + "</h1><p>" + p.brand + " · " + p.design + " · Ply " + p.ply + "</p>" +
        "<p class=\"shop-card-price\" style=\"font-size:1.5rem\">" + window.PBC_Cart.formatPrice(p.price) + "</p>" +
        "<input type=\"number\" id=\"pqty\" min=\"1\" value=\"1\" class=\"catalog-qty\"> " +
        "<button class=\"btn btn-primary\" id=\"padd\">Add to cart</button></article>";
      document.getElementById("padd").onclick = function () {
        window.PBC_Cart.add(p, document.getElementById("pqty").value);
        location.href = "cart.html";
      };
    })();
  </script>
</body>
</html>
